services:
  backend:
    build: .
    container_name: ecom-backend
    ports:
      - "2004:2004"
    env_file: .env
    
    volumes:
      - ./uploads:/app/uploads
    
    depends_on:
      postgres:
        condition: service_healthy
    
    networks:
      - ecom-network
    
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    env_file: .env
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init.sh
    
    networks:
      - ecom-network
    
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
    name: ecom_postgres_data

networks:
  ecom-network:
    driver: bridge
